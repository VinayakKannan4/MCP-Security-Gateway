services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URLs with Docker service names
      - DATABASE_URL=postgresql+asyncpg://gateway:gateway@postgres:5432/gateway
      - REDIS_URL=redis://redis:6379/0
      - OTEL_ENABLED=true
      - OTEL_ENDPOINT=http://otel-collector:4317
      # No staging.yaml exists → loader falls back to default.yaml (has all env rules)
      - ENVIRONMENT=staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_ADMIN_KEY: ${ADMIN_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      - gateway

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "55679:55679" # zpages debug UI
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC from collector

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  postgres_data:
  grafana_data:
